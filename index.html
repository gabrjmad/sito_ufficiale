<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Image Sequence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* body deve poter scorrere */
    body {
      background: #000;
    }

    /* questo div crea lo spazio di scroll — non è visibile */
    #scroll-space {
      /* altezza impostata via JS */
    }

    /* tutto il visual è fixed */
    #stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      display: block;
    }

    #fade-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- questo div crea lo spazio scrollabile -->
  <div id="scroll-space"></div>

  <!-- visual fisso -->
  <div id="stage">
    <canvas id="sequence"></canvas>
    <div id="fade-overlay"></div>
  </div>

<script>
  /* ─── CONFIG ───────────────────────────────────────────────────
     Modifica questi valori per calibrare la velocità e il fade
  ──────────────────────────────────────────────────────────────── */
  const FRAME_COUNT    = 144;          // frame totali (000 → 143)
  const PX_PER_FRAME   = 18;           // pixel di scroll per ogni frame
  const FADE_PX        = 300;          // pixel di scroll dedicati al fade nero DOPO l'ultimo frame
  /* ─────────────────────────────────────────────────────────────── */

  const frameSrc = i =>
    `img-sequence/video1__2__${i.toString().padStart(3, '0')}.jpg`;

  // Totale pixel di scroll = sequenza + fade
  const SEQUENCE_PX = FRAME_COUNT * PX_PER_FRAME;
  const TOTAL_PX    = SEQUENCE_PX + FADE_PX;

  // Imposta altezza della pagina
  const scrollSpace = document.getElementById('scroll-space');
  scrollSpace.style.height = (TOTAL_PX + window.innerHeight) + 'px';

  // Aggiorna se finestra cambia dimensione
  window.addEventListener('resize', () => {
    scrollSpace.style.height = (TOTAL_PX + window.innerHeight) + 'px';
    applyCanvasCover();
    redraw();
  });

  /* ─── CANVAS + COVER ─────────────────────────────────────────── */
  const canvas  = document.getElementById('sequence');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('fade-overlay');

  let naturalW = 1920, naturalH = 1080;

  function applyCanvasCover() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const imgRatio  = naturalW / naturalH;
    const viewRatio = vw / vh;

    let drawW, drawH;
    if (viewRatio > imgRatio) {
      drawW = vw;
      drawH = vw / imgRatio;
    } else {
      drawH = vh;
      drawW = vh * imgRatio;
    }

    drawW = Math.round(drawW);
    drawH = Math.round(drawH);

    canvas.width         = drawW;
    canvas.height        = drawH;
    canvas.style.left    = Math.round((vw - drawW) / 2) + 'px';
    canvas.style.top     = Math.round((vh - drawH) / 2) + 'px';
    canvas.style.width   = drawW + 'px';
    canvas.style.height  = drawH + 'px';
  }

  /* ─── PRELOAD ────────────────────────────────────────────────── */
  const images = [];
  let loadedFirst = false;

  for (let i = 0; i < FRAME_COUNT; i++) {
    const img = new Image();
    img.src = frameSrc(i);
    img.onload = function () {
      if (!loadedFirst) {
        loadedFirst = true;
        naturalW = img.naturalWidth  || naturalW;
        naturalH = img.naturalHeight || naturalH;
        applyCanvasCover();
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      }
    };
    images.push(img);
  }

  /* ─── SCROLL ─────────────────────────────────────────────────── */
  let lastFrameIdx = -1;

  function redraw() {
    const scrollY = window.scrollY;

    // ── Quale frame mostrare ──
    const frameIdx = Math.min(
      FRAME_COUNT - 1,
      Math.max(0, Math.floor(scrollY / PX_PER_FRAME))
    );

    if (frameIdx !== lastFrameIdx) {
      lastFrameIdx = frameIdx;
      const img = images[frameIdx];
      if (img && img.complete) {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      }
    }

    // ── Fade nero: parte SOLO dopo l'ultimo frame ──
    const fadeStart = SEQUENCE_PX;          // pixel in cui inizia il fade
    const fadeEnd   = SEQUENCE_PX + FADE_PX; // pixel in cui il nero è completo

    if (scrollY <= fadeStart) {
      overlay.style.opacity = 0;
    } else {
      const fadeFrac = (scrollY - fadeStart) / FADE_PX;
      overlay.style.opacity = Math.min(1, fadeFrac).toFixed(4);
    }
  }

  window.addEventListener('scroll', () => requestAnimationFrame(redraw), { passive: true });

  // Render iniziale
  applyCanvasCover();
  redraw();
</script>

</body>
</html>
