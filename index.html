<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Sequence + Porta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; }

    #scroll-space { /* altezza impostata via JS */ }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #sequence {
      position: absolute;
      display: block;
    }

    #fade-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
    }

    /* ── PORTA + TUNNEL ───────────────────────── */
    #door-scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }

    #door-wrapper {
      position: relative;
      width: 360px;
      height: 520px;
      transform-origin: center center;
      transform: scale(0.1);
    }

    #door-svg {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
      z-index: 2;
    }

    /* Area interna della porta che contiene il tunnel */
    #door-tunnel {
      position: absolute;
      /* valori calibrati per stare dentro il telaio interno */
      top: 16%;
      left: 23%;
      width: 54%;
      height: 64%;
      background: #6fb0e6; /* azzurro interno come riferimento */
      overflow: hidden;
      perspective: 900px;
      z-index: 1;
    }

    #tunnel-inner {
      position: absolute;
      inset: -60% -60%; /* più grande dell'apertura per effetto tunnel */
      transform-style: preserve-3d;
      transform-origin: center center;
    }

    .tunnel-word {
      position: absolute;
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      color: #f5f7ff;
      white-space: nowrap;
      line-height: 1;
      user-select: none;
      transform-origin: center center;
    }
  </style>
</head>
<body>

<div id="scroll-space"></div>

<div id="stage">
  <canvas id="sequence"></canvas>
  <div id="fade-overlay"></div>

  <!-- PORTA + TUNNEL -->
  <div id="door-scene">
    <div id="door-wrapper">

      <!-- Tunnel parole dentro l'apertura della porta -->
      <div id="door-tunnel">
        <div id="tunnel-inner"></div>
      </div>

      <!-- Porta flat / design -->
      <svg id="door-svg" viewBox="0 0 360 520" xmlns="http://www.w3.org/2000/svg">
        <!-- sfondo interno nero per non creare ombre sul sito -->
        <rect x="0" y="0" width="360" height="520" fill="#000" />

        <!-- telaio esterno bianco -->
        <rect x="20" y="20" width="320" height="480" fill="#f5f5f5" />

        <!-- bordo interno grigio chiaro per suggerire profondità -->
        <rect x="36" y="36" width="288" height="448" fill="#e9e9e9" />

        <!-- linea interna che separa le due ante -->
        <rect x="180" y="36" width="2" height="448" fill="#d0d0d0" />

        <!-- anta sinistra -->
        <g id="door-left" style="transform-origin: 36px 260px; transform-box: fill-box;">
          <!-- pannello anta -->
          <rect x="36" y="36" width="144" height="448" fill="#fdfdfd" />
          <!-- cornice interna anta -->
          <rect x="48" y="52" width="120" height="416" fill="#f2f2f2" />
          <rect x="56" y="60" width="104" height="400" fill="#fdfdfd" />
          <!-- maniglia -->
          <rect x="160" y="246" width="8" height="32" rx="4" fill="#d0d0d0" />
        </g>

        <!-- anta destra -->
        <g id="door-right" style="transform-origin: 324px 260px; transform-box: fill-box;">
          <rect x="196" y="36" width="144" height="448" fill="#fdfdfd" />
          <rect x="208" y="52" width="120" height="416" fill="#f2f2f2" />
          <rect x="216" y="60" width="104" height="400" fill="#fdfdfd" />
          <rect x="196" y="246" width="8" height="32" rx="4" fill="#d0d0d0" />
        </g>

        <!-- bordo sottilissimo per definire il frame -->
        <rect x="20" y="20" width="320" height="480" fill="none" stroke="#d0d0d0" stroke-width="2" />
      </svg>

    </div>
  </div>

</div>

<script>
/* ───────────────── CONFIG GENERALE ───────────────── */
const FRAME_COUNT  = 144;      // 000 → 143
const PX_PER_FRAME = 18;       // scroll per frame
const FADE_PX      = 250;      // fade al nero
const DOOR_ZOOM_PX = 1200;     // quanto dura lo zoom sulla porta
const DOOR_OPEN_PX = 600;      // quanto dura l'apertura delle ante
const TUNNEL_PX    = 900;      // quanto dura la rotazione del tunnel

const TOTAL_PX = (FRAME_COUNT * PX_PER_FRAME) + FADE_PX + DOOR_ZOOM_PX + DOOR_OPEN_PX + TUNNEL_PX;

const frameSrc = i => `img-sequence/video1__2__${i.toString().padStart(3, '0')}.jpg`;

const S_SEQ_END   = FRAME_COUNT * PX_PER_FRAME;
const S_FADE_END  = S_SEQ_END + FADE_PX;
const S_ZOOM_END  = S_FADE_END + DOOR_ZOOM_PX;
const S_OPEN_END  = S_ZOOM_END + DOOR_OPEN_PX;
const S_TUNN_END  = S_OPEN_END + TUNNEL_PX;

/* ───────────────── SCROLL SPACE ─────────────────── */
const scrollSpace = document.getElementById('scroll-space');
function setScrollHeight() {
  scrollSpace.style.height = (TOTAL_PX + window.innerHeight) + 'px';
}
setScrollHeight();

/* ───────────────── CANVAS SEQUENZA ──────────────── */
const canvas  = document.getElementById('sequence');
const ctx     = canvas.getContext('2d');
let natW = 1920, natH = 1080;

function applyCanvasCover() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const ir = natW / natH;
  const vr = vw / vh;
  let dw, dh;
  if (vr > ir) { dw = vw; dh = vw / ir; }
  else { dh = vh; dw = vh * ir; }
  dw = Math.round(dw); dh = Math.round(dh);
  canvas.width = dw; canvas.height = dh;
  canvas.style.left = Math.round((vw - dw) / 2) + 'px';
  canvas.style.top  = Math.round((vh - dh) / 2) + 'px';
  canvas.style.width  = dw + 'px';
  canvas.style.height = dh + 'px';
}

const images = [];
let firstLoaded = false;
for (let i = 0; i < FRAME_COUNT; i++) {
  const img = new Image();
  img.src = frameSrc(i);
  img.onload = function () {
    if (!firstLoaded) {
      firstLoaded = true;
      natW = img.naturalWidth || natW;
      natH = img.naturalHeight || natH;
      applyCanvasCover();
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }
  };
  images.push(img);
}

/* ───────────────── TUNNEL PAROLE ────────────────── */
const WORDS = [
  { text: 'GABRJMAD', size: 130, x: 5,   y: 10,  rot: -5  },
  { text: 'DESIGNER', size: 90,  x: 55,  y: 18,  rot: 8   },
  { text: 'INVESTOR', size: 110, x: 10,  y: 40,  rot: -8  },
  { text: 'BUISNESS', size: 100, x: 55,  y: 45,  rot: 7   },
  { text: 'MODEL',    size: 140, x: 0,   y: 60,  rot: -10 },
  { text: 'ROUND',    size: 95,  x: 60,  y: 68,  rot: 6   },
  { text: 'FRONT',    size: 120, x: 8,   y: 78,  rot: -7  },
  { text: 'BELLO',    size: 105, x: 58,  y: 82,  rot: 9   },
  { text: 'GABRJMAD', size: 70,  x: -5,  y: 28,  rot: 4   },
  { text: 'DESIGNER', size: 150, x: 25,  y: 52,  rot: -4  },
];

const tunnelInner = document.getElementById('tunnel-inner');
WORDS.forEach(w => {
  const el = document.createElement('div');
  el.className = 'tunnel-word';
  el.textContent = w.text;
  el.style.fontSize = w.size + 'px';
  el.style.left = w.x + '%';
  el.style.top  = w.y + '%';
  el.style.transform = `rotate(${w.rot}deg)`;
  tunnelInner.appendChild(el);
});

/* ───────────────── DOM ELEMENTS ─────────────────── */
const overlay     = document.getElementById('fade-overlay');
const doorScene   = document.getElementById('door-scene');
const doorWrapper = document.getElementById('door-wrapper');
const doorLeft    = document.getElementById('door-left');
const doorRight   = document.getElementById('door-right');
const doorTunnel  = document.getElementById('door-tunnel');

/* ───────────────── HELPERS ─────────────────────── */
function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }
function norm(v, a, b)      { return clamp((v - a) / (b - a), 0, 1); }
function ease(t)            { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }

/* ───────────────── SCROLL LOGIC ─────────────────── */
let lastFrameIdx = -1;

function redraw() {
  const sy = window.scrollY || document.documentElement.scrollTop || 0;

  /* 1) Sequenza immagini */
  const frameIdx = clamp(Math.floor(sy / PX_PER_FRAME), 0, FRAME_COUNT - 1);
  if (frameIdx !== lastFrameIdx) {
    lastFrameIdx = frameIdx;
    const img = images[frameIdx];
    if (img && img.complete) {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }
  }

  /* 2) Fade nero */
  const fadeT = norm(sy, S_SEQ_END, S_FADE_END);
  overlay.style.opacity = fadeT.toFixed(4);

  /* Da qui in poi tutto su sfondo nero */
  if (sy < S_FADE_END) {
    doorScene.style.opacity = '0';
    return;
  }

  doorScene.style.opacity = '1';

  /* 3) Zoom-through porta (porta ferma al centro, scala verso di noi) */
  const zoomT = ease(norm(sy, S_FADE_END, S_TUNN_END));
  const scale = 0.08 + zoomT * 3.2; // da molto piccola a molto grande
  doorWrapper.style.transform = `scale(${scale.toFixed(4)})`;

  /* 4) Apertura delle ante (progressiva) */
  const openT = ease(norm(sy, S_FADE_END, S_OPEN_END));
  const leftDeg  = -85 * openT;  // verso l'esterno
  const rightDeg =  85 * openT;
  doorLeft.style.transform  = `perspective(900px) rotateY(${leftDeg.toFixed(2)}deg)`;
  doorRight.style.transform = `perspective(900px) rotateY(${rightDeg.toFixed(2)}deg)`;

  /* 5) Tunnel parole in prospettiva (ruota verso di noi) */
  const tunnelT = ease(norm(sy, S_ZOOM_END, S_TUNN_END));
  const rotX = -20 - 70 * tunnelT;       // da -20° a circa -90°
  const translateZ = -400 + 400*tunnelT; // si avvicina
  tunnelInner.style.transform = `translateZ(${translateZ}px) rotateX(${rotX}deg)`;
}

window.addEventListener('scroll', () => requestAnimationFrame(redraw), { passive: true });
window.addEventListener('resize', () => { setScrollHeight(); applyCanvasCover(); redraw(); });

applyCanvasCover();
redraw();
</script>

</body>
</html>
